<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body{
            background-color: #d17aa7;
            color: white;
        }

        #contact{
            margin-top: 0px;
            padding-bottom: 20px;
        }

        textarea {
            background-color: #e396ba; 
            border: none;
            padding: 10px;
            color: black; 
        }

        input {
            background-color: #e396ba; 
            border: none;
            padding: 10px;
            color: white; 
        }

        nav ul li.active:hover{
            background-color: #c881a3;
            border-radius: 5px;
        }

        #contact-form{
            color: #d398b6;
        }

        footer{
            background-color: #e396ba;
        }
    </style>
</head>
<body>
<div class="first">
        <header>
       <img src="img/silkroot (3) (1).png" alt="Silk root logo">
    <nav>
        <ul>
            <li class="active"><a href="home.html">HOME</a></li>
            <li class="active"><a href="about.html">ABOUT</a></li>
            <li class="active"><a href="products.html">PRODUCTS</a></li>
            <li class="active"><a href="contact.html">CONTACT</a></li>
            <li class="active"><a href="yourcart.html">YOUR CART</a></li>
        </ul>
    </nav>
    </header>   
</div>

    <section id="contact">
        <div class="container">
            <div class="title">
                <h2>Contact Us</h2>
                <div class="line"></div>
                <p>Feel free to reach out to us with any questions or inquiries!</p>
            </div>
            <div id="contact-form">
                <form>
                    <div class="form-row">
                        <input style="background-color: #e396ba; border: none; padding: 10px; color: white;" type="text" name="name" placeholder="Your Name">
                        <input style="background-color: #e396ba; border: none; padding: 10px; color: white;" class="email" type="email" name="email" placeholder="Your Email">
                    </div>
                    <div class="form-row">
                        <textarea type="message" name="message" placeholder="Your Message"></textarea>
                    </div>
                    <div class="form-row">
                        <input style="background-color:#e396ba;" type="submit" class="big-button" value="Send Message">
                    </div>
                </form>
            </div>
        </div>
    </section><br><br>

           <footer>
        <div class="footer-links">
            <ul>
                <li><a href="https://www.facebook.com/" target="_blank">Facebook</a></li>
                <li><a href="https://www.instagram.com/" target="_blank">Instagram</a></li>
                <li><a href="https://www.tiktok.com/" target="_blank">Tiktok</a></li>
                <li><a href="https://www.twitter.com/" target="_blank">Twitter</a></li>
                <li><a href="https://www.viber.com/" target="_blank">Viber</a></li>
                <li><a href="https://www.whatsapp.com/" target="_blank">Whatsapp</a></li>
            </ul>
        </div>
    </footer>

</body>
</html>
